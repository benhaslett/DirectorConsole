<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director's Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .aspect-video { aspect-ratio: 16 / 9; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div x-data="directorApp()" class="container mx-auto p-6">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-emerald-400 tracking-tight">🎬 Director's Console</h1>
            <div class="flex gap-4">
                <select x-model="videoModel" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-purple-500 text-purple-400 font-semibold">
                    <option value="ltx">LTX (Standard)</option>
                    <option value="wan">Wan 2.2 (5s Coherent)</option>
                </select>
                <select x-model="selectedAudio" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-500 text-yellow-400 font-semibold max-w-xs">
                    <option value="">🎵 No Audio Track</option>
                    <template x-for="track in audioTracks" :key="track.path">
                        <option :value="track.path" x-text="track.name"></option>
                    </template>
                </select>
                <select x-model="selectedProject" @change="loadProject()" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                    <option value="">Select Project...</option>
                    <template x-for="project in projects" :key="project">
                        <option :value="project" x-text="project"></option>
                    </template>
                </select>
                <button @click="createProject()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded text-sm shadow transition flex items-center gap-1" title="New Project">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    New
                </button>
                <button @click="refreshProjects()" class="text-gray-400 hover:text-white" title="Refresh List">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- No Project Selected -->
            <div x-show="!currentProject" class="text-center py-20 text-gray-500">
                <p class="text-xl">Select a project to begin.</p>
            </div>

            <!-- Project Loaded -->
            <div x-show="currentProject" x-cloak>
                
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-2xl font-semibold" x-text="currentProject.concept || selectedProject"></h2>
                        <p class="text-gray-400 text-sm" x-text="currentProject.shots.length + ' shots total'"></p>
                    </div>
                    <div class="flex gap-3">
                        <button @click="saveProject()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V6h5a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h5v5.586l-1.293-1.293zM9 4a1 1 0 012 0v2H9V4z"/></svg>
                            Save
                        </button>
                        <button @click="$refs.bulkUploadInput.click()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded shadow transition flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                            Bulk Import
                        </button>
                        <input type="file" x-ref="bulkUploadInput" class="hidden" multiple accept="image/*" @change="bulkUpload($event)">
                        <button @click="exportToDirector()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded shadow transition flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                            Export MD
                        </button>
                    </div>
                </div>

                <!-- Notification -->
                <div x-show="notification" x-transition :class="notifType === 'error' ? 'bg-red-600' : notifType === 'info' ? 'bg-blue-600 animate-pulse' : 'bg-emerald-600'" class="fixed top-5 right-5 text-white px-6 py-3 rounded shadow-lg z-50">
                    <span x-text="notification"></span>
                </div>

                <!-- Shots Table -->
                <div class="overflow-x-auto bg-gray-800 rounded-lg border border-gray-700 shadow-xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-900 text-gray-400 uppercase text-xs tracking-wider border-b border-gray-700">
                                <th class="p-4 w-16">ID</th>
                                <th class="p-4 w-1/4">Source Image</th>
                                <th class="p-4 w-1/3">LTX.2 Prompt</th>
                                <th class="p-4 w-1/4">Result Video</th>
                                <th class="p-4 w-24">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-700">
                            <template x-for="(shot, index) in currentProject.shots" :key="shot.id">
                                <tr class="hover:bg-gray-750 transition-colors">
                                    
                                    <!-- ID -->
                                    <td class="p-4 font-mono text-gray-500" x-text="shot.id"></td>
                                    
                                    <!-- Image Column -->
                                    <td class="p-4 align-top">
                                        <div class="relative w-full aspect-video bg-gray-900 rounded overflow-hidden border border-gray-700 flex flex-col items-center justify-center group">
                                            
                                            <!-- Image Display -->
                                            <template x-if="shot.image_file">
                                                <img :src="resolvePath(shot.image_file)" class="absolute inset-0 w-full h-full object-cover">
                                            </template>
                                            
                                            <!-- Placeholder (only show if no image) -->
                                            <template x-if="!shot.image_file">
                                                <div class="flex flex-col items-center text-gray-600">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                                    </svg>
                                                    <span class="text-xs">No Image</span>
                                                </div>
                                            </template>

                                            <!-- Always visible upload button (if no image) or hover overlay (if image exists) -->
                                            <div :class="shot.image_file ? 'opacity-0 group-hover:opacity-100 bg-black/70' : 'bg-transparent'" 
                                                 class="absolute inset-0 flex items-center justify-center transition-opacity cursor-pointer z-10" 
                                                 @click="$refs['fileInput'+shot.id].click()">
                                                <button class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 py-1 rounded shadow flex items-center gap-1 pointer-events-none">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                                                    <span x-text="shot.image_file ? 'Change Image' : 'Upload Image'"></span>
                                                </button>
                                            </div>
                                            
                                            <input type="file" :x-ref="'fileInput'+shot.id" class="hidden" accept="image/*" @change="uploadImage(shot.id, $event)">
                                        </div>
                                        <div class="mt-2 text-xs text-gray-500 truncate" x-text="shot.image_file ? shot.image_file.split('\\').pop() : ''"></div>
                                    </td>

                                    <!-- Prompt Column -->
                                    <td class="p-4 align-top">
                                        <label class="block text-xs text-gray-500 mb-1 uppercase">Image Prompt (Ref)</label>
                                        <textarea x-model="shot.image_prompt" rows="2" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-xs text-gray-400 mb-3 focus:outline-none focus:border-gray-600" placeholder="Image Prompt..."></textarea>
                                        
                                        <label class="block text-xs text-emerald-500 mb-1 uppercase font-bold">LTX.2 Video Prompt</label>
                                        <textarea x-model="shot.video_prompt" rows="4" class="w-full bg-gray-900 border border-emerald-900/50 rounded p-2 text-sm text-gray-200 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500" placeholder="Describe the motion..."></textarea>
                                    </td>

                                    <!-- Video Column -->
                                    <td class="p-4 align-top">
                                        <div class="w-full aspect-video bg-black rounded overflow-hidden border border-gray-700 flex items-center justify-center">
                                            <template x-if="shot.video_file">
                                                <video controls class="w-full h-full object-cover">
                                                    <source :src="resolvePath(shot.video_file)" type="video/mp4">
                                                    Your browser does not support video.
                                                </video>
                                            </template>
                                            <template x-if="!shot.video_file">
                                                <div class="text-gray-700 text-sm">Waiting for Render</div>
                                            </template>
                                        </div>
                                        <div class="mt-2 flex justify-between items-center">
                                            <span class="text-xs font-mono uppercase px-2 py-1 rounded bg-gray-900 text-gray-400" x-text="shot.status"></span>
                                            <span class="text-xs text-gray-600" x-show="shot.duration" x-text="shot.duration + 's'"></span>
                                        </div>
                                    </td>

                                    <!-- Actions Column -->
                                    <td class="p-4 align-top text-center flex flex-col gap-2">
                                       <button @click="generatePrompts(shot.id)" class="bg-gray-700 hover:bg-emerald-600 text-white p-2 rounded-full shadow transition" title="Auto-Generate Prompts">
                                           <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                               <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" />
                                           </svg>
                                       </button>

                                       <button @click="queueImage(shot.id)" class="bg-gray-700 hover:bg-blue-600 text-white p-2 rounded-full shadow transition" title="Generate Cinematic Still (Re-Imagine)">
                                           <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                               <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd" />
                                           </svg>
                                       </button>

                                       <button @click="queueShot(shot.id)" class="bg-gray-700 hover:bg-purple-600 text-white p-2 rounded-full shadow transition" title="Generate Video (Wan 2.2)">
                                           <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                               <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                                           </svg>
                                       </button>
                                       <button @click="queueAudioVideo(shot.id)" :disabled="!selectedAudio" :class="selectedAudio ? 'bg-gray-700 hover:bg-yellow-600' : 'bg-gray-800 opacity-40 cursor-not-allowed'" class="text-white p-2 rounded-full shadow transition" title="Generate Video with Audio (LTX 2.3)">
                                           🎵
                                       </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function directorApp() {
            return {
                projects: [],
                selectedProject: '',
                currentProject: null,
                videoModel: 'ltx',
                selectedAudio: '',
                audioTracks: [],
                notification: '',
                notifType: 'success',
                notifTimer: null,

                async init() {
                    await this.refreshProjects();
                    await this.loadAudioTracks();
                },

                async loadAudioTracks() {
                    try {
                        const res = await fetch('/api/tracks');
                        this.audioTracks = await res.json();
                    } catch(e) {
                        console.error('Failed to load audio tracks', e);
                    }
                },

                async queueAudioVideo(shotId) {
                    if (!this.selectedProject) return;
                    if (!this.selectedAudio) {
                        this.notify('Select an audio track first!', 'error');
                        return;
                    }
                    this.notify(`Queueing Audio Video for Shot ${shotId}...`, 'info');
                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/queue-audio-video/${shotId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ audioPath: this.selectedAudio })
                        });
                        const data = await res.json();
                        if (data.success) {
                            this.notify(`🎵 Shot ${shotId} queued with audio!`);
                        } else {
                            this.notify('Failed: ' + data.error, 'error');
                        }
                    } catch(e) {
                        this.notify('Request failed', 'error');
                    }
                },

                async refreshProjects() {
                    try {
                        const res = await fetch('/api/projects');
                        this.projects = await res.json();
                        // If selectedProject is set but not in list (edge case), keep it? 
                        // Or if we just created one, we want to ensure it's selected.
                    } catch (e) {
                        console.error("Failed to load projects", e);
                    }
                },

                async loadProject() {
                    if (!this.selectedProject) {
                        this.currentProject = null;
                        return;
                    }
                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}`);
                        this.currentProject = await res.json();
                    } catch (e) {
                        console.error("Failed to load project details", e);
                    }
                },

                async saveProject() {
                    if (!this.currentProject) return;
                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.currentProject)
                        });
                        if (res.ok) {
                            this.notify('Project saved successfully');
                        }
                    } catch (e) {
                        console.error("Save failed", e);
                        this.notify('Save failed!', 'error');
                    }
                },

                async uploadImage(shotId, event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    const formData = new FormData();
                    formData.append('image', file);

                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/upload/${shotId}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            // Update local state to reflect new image immediately
                            const shot = this.currentProject.shots.find(s => s.id === shotId);
                            if (shot) {
                                shot.image_file = data.filePath; // Store absolute path
                                // Force reactivity hack if needed, but Alpine usually catches this
                                this.notify('Image uploaded');
                            }
                        }
                    } catch (e) {
                        console.error("Upload failed", e);
                        this.notify('Upload failed', 'error');
                    }
                },

                async exportToDirector() {
                    if (!this.currentProject) return;
                    // Auto-save first
                    await this.saveProject();
                    
                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/export`, {
                            method: 'POST'
                        });
                        const data = await res.json();
                        if (data.success) {
                            this.notify(`Exported to ${data.path}`);
                        }
                    } catch (e) {
                        console.error("Export failed", e);
                    }
                },

                async bulkUpload(event) {
                    const files = event.target.files;
                    if (!files.length) return;

                    const formData = new FormData();
                    // Append multiple files with same field name 'images'
                    for (let i = 0; i < files.length; i++) {
                        formData.append('images', files[i]);
                    }

                    this.notify('Uploading ' + files.length + ' images...', 'info');

                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/bulk-upload`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            // Reload project to get fresh data
                            await this.loadProject();
                            this.notify(`Imported ${data.newShots.length} shots`);
                        } else {
                            this.notify('Upload error: ' + data.error, 'error');
                        }
                    } catch (e) {
                        console.error("Bulk upload failed", e);
                        this.notify('Bulk upload failed', 'error');
                    }
                },

                async queueImage(shotId) {
                    if (!this.selectedProject) return;
                    this.notify('Queueing Image Gen for Shot ' + shotId + '...', 'info');

                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/queue-image/${shotId}`, {
                            method: 'POST'
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            this.notify('Image Gen Queued! Check comfy/output folder.');
                        } else {
                            this.notify('Failed: ' + data.error, 'error');
                        }
                    } catch (e) {
                        console.error("Queue failed", e);
                        this.notify('Request failed', 'error');
                    }
                },

                async queueShot(shotId) {
                    if (!this.selectedProject) return;
                    this.notify(`Queueing Shot ${shotId} using ${this.videoModel.toUpperCase()}...`, 'info');

                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/queue-video/${shotId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: this.videoModel })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            this.notify('Shot ' + shotId + ' queued successfully!');
                        } else {
                            this.notify('Failed to queue: ' + data.error, 'error');
                        }
                    } catch (e) {
                        console.error("Queue failed", e);
                        this.notify('Queue request failed', 'error');
                    }
                },

                async generatePrompts(shotId = null) {
                    if (!this.selectedProject) return;
                    
                    const msg = shotId ? `⚡ Generating prompts for Shot ${shotId} — please wait (AI running)...` : '⚡ Generating all prompts — this may take a while...';
                    this.notify(msg, 'info', true); // persist until done
                    
                    try {
                        const res = await fetch(`/api/project/${this.selectedProject}/generate-prompts`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ shotId: shotId })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            await this.loadProject();
                            this.notify(`✅ Updated prompts for ${data.updated} shot(s)`);
                        } else {
                            this.notify('❌ Failed: ' + (data.error || 'Unknown error'), 'error');
                        }
                    } catch (e) {
                        console.error("Prompt generation failed", e);
                        this.notify('❌ Generation failed: ' + e.message, 'error');
                    }
                },

                async createProject() {
                    const name = prompt("Enter new project name (e.g., MyNewVideo):");
                    if (!name) return;
                    
                    // Simple validation: alphanumeric + underscores/dashes only
                    const safeName = name.replace(/[^a-zA-Z0-9_-]/g, '_');
                    
                    try {
                        const res = await fetch('/api/project/create', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: safeName })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            await this.refreshProjects();
                            this.selectedProject = data.name; // Use returned name
                            await this.loadProject();
                            this.notify('Project created: ' + data.name);
                        } else {
                            this.notify('Creation failed: ' + data.error, 'error');
                        }
                    } catch (e) {
                        console.error("Create failed", e);
                        this.notify('Create request failed: ' + e.message, 'error');
                    }
                },

                notify(msg, type = 'success', persist = false) {
                    if (this.notifTimer) clearTimeout(this.notifTimer);
                    this.notification = msg;
                    this.notifType = type;
                    if (!persist) {
                        this.notifTimer = setTimeout(() => { this.notification = ''; this.notifTimer = null; }, 4000);
                    }
                },

                resolvePath(absolutePath) {
                    if (!absolutePath) return '';
                    // Convert absolute Windows path to relative URL served by /projects-static
                    // Assuming path contains "projects\ProjectName\..."
                    // We need to extract everything after "projects"
                    
                    // Normalize slashes
                    const normalized = absolutePath.replace(/\\/g, '/');
                    const parts = normalized.split('/projects/');
                    
                    if (parts.length > 1) {
                        return `/projects-static/${parts[1]}`;
                    }
                    return absolutePath; // Fallback
                }
            }
        }
    </script>
</body>
</html>
